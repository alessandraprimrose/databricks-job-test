variables:
  catalog:
    description: Unity Catalog name for this environment
  cluster_id:
    description: Cluster ID for each environment
    
resources:
  jobs:
    job_gold:
      name: job_gold
      tasks:
        - task_key: gold_forecast_dlt
          notebook_task:
            notebook_path: /Workspace/Users/ally.allen@circyl.co.uk/Datalake_Forecasting/Databricks/pipeline/gold/pipeline_gold_dlt
            base_parameters:
              TARGET_SCHEMA: gold_forecasting
              GOLD_QUERIES_PATH: /Volumes/${var.catalog}/config/gold_forecasting
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
        - task_key: gold_items_dlt
          notebook_task:
            notebook_path: /Workspace/Users/ally.allen@circyl.co.uk/Datalake_Forecasting/Databricks/pipeline/gold/pipeline_gold_dlt
            base_parameters:
              TARGET_SCHEMA: gold_items
              GOLD_QUERIES_PATH: /Volumes/${var.catalog}/config/gold_items
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
        - task_key: gold_shared_dlt
          notebook_task:
            notebook_path: /Workspace/Users/ally.allen@circyl.co.uk/Datalake_Forecasting/Databricks/pipeline/gold/pipeline_gold_dlt
            base_parameters:
              TARGET_SCHEMA: gold_shared
              GOLD_QUERIES_PATH: /Volumes/${var.catalog}/config/gold_shared
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
      queue:
        enabled: true


targets:
  dev:
    mode: development
    workspace:
      host: https://adb-7405615676142325.5.azuredatabricks.net/
    variables:
      catalog: datalake_dev
      cluster_id: 0605-081756-ixj7yqyo

  staging:
    mode: production
    workspace:
      host: https://<your-staging-workspace>.azuredatabricks.net
    variables:
      catalog: <stag-catalog>
      cluster_id: <stag-cluster-id>

  prod:
    mode: production
    workspace:
      host: https://<your-prod-workspace>.azuredatabricks.net
    variables:
      catalog: <prod-catalog>
      cluster_id: <prod-cluster-id>
