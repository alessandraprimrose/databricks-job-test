bundle:
  name: dxe_data_ingestion-bundle

permissions:
  group_name: users
  level: CAN_MANAGE

include: 
  notebooks/*.yml

artifacts:
  common_package:
    type: whl
    path:
    build: pip wheel

variables:
  catalog:
    description:  UnityCatalog name for each environment
    default: datalake_dev
  cluster_id:
    description: ClusterID for each environment
  silver_job_id:
    description: Environment specific ID for silver job
  gold_queries_path:
    description: Volume path to find gold queries in each environment

resources:
  jobs:
    job_master:
      name: job_master
      tasks:
        - task_key: run_control_master
          notebook_task:
            notebook_path: /Workspace/Users/jay.tuck@circyl.co.uk/Datalake_Forecasting/Databricks/notebooks/ingestion/control-master
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
        - task_key: run_extract_bronze
          depends_on:
            - task_key: run_control_master
          notebook_task:
            notebook_path: /Workspace/Users/jay.tuck@circyl.co.uk/Datalake_Forecasting/Databricks/notebooks/extract/control-extract-bronze-sql
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
        - task_key: run_extract_csv
          depends_on:
            - task_key: run_control_master
          notebook_task:
            notebook_path: /Workspace/Users/jay.tuck@circyl.co.uk/Datalake_Forecasting/Databricks/notebooks/extract/control-extract-bronze-csv
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
        - task_key: run_job_silver
          depends_on:
            - task_key: run_extract_bronze
            - task_key: run_extract_csv
          run_job_task:
            job_id: ${var.silver_job_id}
        - task_key: populate_keymap_tables
          depends_on:
            - task_key: run_job_silver
          notebook_task:
            notebook_path: /Workspace/Users/ally.allen@circyl.co.uk/Datalake_Forecasting/Databricks/notebooks/transform/populate_gold_keymap
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
        - task_key: run_gold_transform
          depends_on:
            - task_key: populate_keymap_tables
          notebook_task:
            notebook_path: /Workspace/Users/jay.tuck@circyl.co.uk/Datalake_Forecasting/Databricks/notebooks/transform/control_gold_transform
            base_parameters:
              queries_path: ${var.gold_queries_path}
            source: WORKSPACE
          existing_cluster_id: ${var.cluster_id}
      queue:
        enabled: true
      parameters:
        - name: dataset
          default: master
        - name: datasource
          default: all
      run_as:
        user_name: ${var.run_as_service_principal}

targets:
  dev:
    mode: development
    workspace:
      host: https://adb-7405615676142325.5.azuredatabricks.net/
    variables:
      catalog: datalake_dev
      silver_job_id: 718334845194690
      cluster_id: 0605-081756-ixj7yqyo
      gold_queries_path: /Volumes/datalake_dev/config/
      run_as_service_principal: <dev-sp-application-id>

  staging:
    mode: production
    workspace:
      host: https://adb-7405608262334943.3.azuredatabricks.net/
    variables:
      catalog: datalake_uat
      silver_job_id: <staging-silver-job-id>
      gold_job_id: <staging-gold-job-id>
      cluster_id: <staging-cluster-id>
      run_as_service_principal: <staging-sp-application-id>

  prod:
    mode: production
    workspace:
      host: https://<your-prod-workspace>.azuredatabricks.net
    variables:
      catalog: datalake_prod
      silver_job_id: <prod-silver-job-id>
      gold_job_id: <prod-gold-job-id>
      cluster_id: <prod-cluster-id>
      run_as_service_principal: <prod-sp-application-id>
